[project]
name = "alambic-ui"
version = "0.1.0"
description = "Alambic — interface d'administration (Flask), souveraine."
requires-python = ">=3.13,<3.14"
dependencies = [
    "flask>=3.0,<4",
    "flask-login>=0.6,<0.7",
    "flask-wtf>=1.2,<2",
    "gunicorn>=22,<24",
    "wtforms>=3.1,<4",
    "python-dotenv>=1.0,<2",
    "pypdf>=4,<6",
    "requests>=2.31,<3",
    "alambic-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alambic_ui"]

[tool.uv.sources]
alambic-core = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["UP037", "UP042"]
