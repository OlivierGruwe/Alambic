{% if error %}
  <div class="doc-error">{{ error }}</div>
{% elif documents %}
  <table class="doc-table">
    <thead>
      <tr><th>ID</th><th>Type</th><th>État</th></tr>
    </thead>
    <tbody>
      {% for d in documents %}
      <tr>
        <td class="mono">{{ d.id }}</td>
        <td>{{ d.doctype }}</td>
        <td><span class="doc-badge doc-badge-{{ d.status|lower }}">{{ d.status }}</span></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% else %}
  <div class="doc-empty">Aucun document pour cette transaction.</div>
{% endif %}
