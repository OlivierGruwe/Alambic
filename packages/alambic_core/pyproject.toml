[project]
name = "alambic-core"
version = "0.1.0"
description = "Alambic core — modèles, accès données et sécurité partagés du pipeline Alambic"
requires-python = ">=3.13,<3.14"

dependencies = [
    "sqlalchemy>=2.0,<3",
    "alembic>=1.13,<2",
    "psycopg[binary]>=3.2,<4",
    "cryptography>=42,<46",
    "argon2-cffi>=23,<24",
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "boto3>=1.34,<2",
    "requests>=2.31,<3",
]

[dependency-groups]
dev = [
    "pytest>=8.2,<9",
    "pytest-cov>=5.0,<6",
    "pytest-mock>=3.14,<4",
    "testcontainers[postgres]>=4.5,<5",
    "ruff>=0.5,<1",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alambic_core"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    # UP037 : les quotes de Mapped["Config"] sont des forward-refs SQLAlchemy
    # volontaires (modèle cible pas encore importé). Les retirer casse les relations.
    "UP037",
    # UP042 : (str, Enum) volontaire pour préserver les valeurs string de flowerscan_lib.
    "UP042",
    # UP046 : Generic[ModelT] reste clair et compatible, pas de migration nécessaire.
    "UP046",
]

[tool.ruff.lint.per-file-ignores]
# Migrations Alembic générées : style toléré.
"migrations/*" = ["UP007", "UP035", "I001"]
# Asserts volontairement larges dans certains tests.
"tests/*" = ["B017"]
# Modèles : F821 sur les forward-refs SQLAlchemy (Mapped["Account"]) est un faux
# positif — ruff ne résout pas les références différées dans les chaînes de type.
"alambic_core/models/*" = ["F821"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: tests nécessitant Docker (testcontainers) — lents",
]
