[project]
name = "alambic-core"
version = "0.1.0"
description = "Alambic core — modèles, accès données et sécurité partagés du pipeline Alambic"
requires-python = ">=3.13,<3.14"

dependencies = [
    "sqlalchemy>=2.0,<3",
    "alembic>=1.13,<2",
    "psycopg[binary]>=3.2,<4",
    "cryptography>=42,<46",
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
]

[dependency-groups]
dev = [
    "pytest>=8.2,<9",
    "pytest-cov>=5.0,<6",
    "pytest-mock>=3.14,<4",
    "testcontainers[postgres]>=4.5,<5",
    "ruff>=0.5,<1",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alambic_core"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: tests nécessitant Docker (testcontainers) — lents",
]
