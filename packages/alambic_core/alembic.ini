# Configuration Alembic pour alambic_core.
# L'URL de base de données n'est PAS ici (sécurité) : elle est injectée
# par env.py depuis CoreSettings (variable ALAMBIC_DATABASE_URL).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# Format des fichiers de version : horodatage + slug lisible.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
