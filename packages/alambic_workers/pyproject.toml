[project]
name = "alambic-workers"
version = "0.1.0"
description = "Alambic workers — tâches Celery et orchestration du pipeline (ex-Step Functions)"
requires-python = ">=3.13,<3.14"

dependencies = [
    "celery>=5.4,<6",
    "kombu>=5.4,<6",
    "redis>=5.0,<6",
    "boto3>=1.34,<2",
    "alambic-core",
]

[dependency-groups]
dev = [
    "pytest>=8.2,<9",
    "pytest-cov>=5.0,<6",
    "pytest-mock>=3.14,<4",
    "ruff>=0.5,<1",
]

[tool.uv]
package = true

[tool.uv.sources]
alambic-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alambic_workers"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    # UP037 : forward-refs SQLAlchemy volontaires (cohérent avec alambic_core).
    "UP037",
    "UP042",
    "UP046",
    # UP047 : idem pour les fonctions génériques (TypeVar explicite, lisible).
    "UP047",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B017"]

[tool.pytest.ini_options]
testpaths = ["tests"]
